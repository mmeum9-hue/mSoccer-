<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/src/assets/images/msoccer_logo_1783863321533.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="google-site-verification" content="zdHPViUre1ISi5pFZSvZj5hJF8P4JsKMmdT18v92EeA" />
    <title>mSoccer</title>
    
    <!-- Configurações PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="mSoccer" />
    <link rel="apple-touch-icon" href="/icon-192.jpg" />
  </head>
  <body class="bg-slate-50 text-slate-900 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Registro do Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((reg) => console.log('Service Worker registrado com sucesso!', reg.scope))
            .catch((err) => console.log('Falha ao registrar o Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
