<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Dark Gradient for Squircle -->
    <radialGradient id="bgGrad" cx="50%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#242428" />
      <stop offset="50%" stop-color="#121214" />
      <stop offset="100%" stop-color="#070708" />
    </radialGradient>

    <!-- Bezel Gradient -->
    <linearGradient id="bezelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4a52" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#121215" stop-opacity="0.95"/>
    </linearGradient>

    <!-- Silver/Grey Fill Gradient for the 'mE' emblem -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4d9e2" />
      <stop offset="40%" stop-color="#b0b5c0" />
      <stop offset="100%" stop-color="#888d98" />
    </linearGradient>

    <!-- Shadow for outer container -->
    <filter id="iconShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.95"/>
    </filter>
  </defs>

  <!-- 1. SQUIRCLE APP CONTAINER (Dark background) -->
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="url(#bgGrad)" filter="url(#iconShadow)" />
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="none" stroke="url(#bezelGrad)" stroke-width="6" />
  <rect x="22" y="22" width="468" height="468" rx="106" ry="106" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.1" />

  <!-- 2. MAIN EMBLEM ('mE' shape + standalone circle, NO middle stem) -->
  <g transform="translate(0, 8)">
    
    <!-- MAIN BODY 'mE' SHAPE: White Outline Backing -->
    <!-- Outer path + Inner cutout path combined with evenodd fill rule -->
    <path fill-rule="evenodd" d="
      M 100,376
      L 100,210
      C 100,138 138,102 190,102
      C 228,102 248,124 256,144
      C 264,124 284,102 322,102
      C 374,102 412,138 412,210
      L 412,224
      H 390
      V 250
      H 412
      V 276
      H 390
      V 302
      H 412
      L 412,376
      C 412,384 404,390 394,390
      L 354,390
      C 344,390 336,384 336,376
      L 336,240
      C 336,182 300,162 256,162
      C 212,162 176,182 176,240
      L 176,376
      C 176,384 168,390 158,390
      L 118,390
      C 108,390 100,384 100,376
      Z
    " fill="#FFFFFF" stroke="#FFFFFF" stroke-width="24" stroke-linejoin="round" stroke-linecap="round" />

    <!-- CIRCLE: White Outline Backing -->
    <circle cx="256" cy="336" r="38" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="24" />

    <!-- MAIN BODY 'mE' SHAPE: Silver Inner Fill Overlay -->
    <path fill-rule="evenodd" d="
      M 100,376
      L 100,210
      C 100,138 138,102 190,102
      C 228,102 248,124 256,144
      C 264,124 284,102 322,102
      C 374,102 412,138 412,210
      L 412,224
      H 390
      V 250
      H 412
      V 276
      H 390
      V 302
      H 412
      L 412,376
      C 412,384 404,390 394,390
      L 354,390
      C 344,390 336,384 336,376
      L 336,240
      C 336,182 300,162 256,162
      C 212,162 176,182 176,240
      L 176,376
      C 176,384 168,390 158,390
      L 118,390
      C 108,390 100,384 100,376
      Z
    " fill="url(#silverGrad)" />

    <!-- CIRCLE: Silver Inner Fill Overlay -->
    <circle cx="256" cy="336" r="38" fill="url(#silverGrad)" />

  </g>
</svg>
