<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient for subtle luxury depth -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141416" />
      <stop offset="100%" stop-color="#070708" />
    </linearGradient>

    <!-- Silver Fill Gradient for Emblem -->
    <linearGradient id="silverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4d8df" />
      <stop offset="100%" stop-color="#a3a8b2" />
    </linearGradient>

    <!-- Inner Shadow for Icon Bezel -->
    <filter id="borderGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.9"/>
    </filter>
  </defs>

  <!-- Squircle App Container (Black Mat) -->
  <rect x="12" y="12" width="488" height="488" rx="110" ry="110" fill="url(#bgGrad)" stroke="#222226" stroke-width="8" filter="url(#borderGlow)" />
  
  <!-- Subtle Inner Bezel Highlight -->
  <rect x="20" y="20" width="472" height="472" rx="102" ry="102" fill="none" stroke="#333338" stroke-width="2" opacity="0.6" />

  <!-- EMBLEM GROUP (Centered) -->
  <g transform="translate(0, 0)">
    
    <!-- WHITE OUTLINE BACKING (Creates the thick 12px white border around silver shape) -->
    <path d="
      M 92,368
      L 92,205
      C 92,150 130,116 182,116
      C 220,116 246,138 256,162
      C 266,138 292,116 330,116
      C 382,116 420,150 420,205
      L 420,225
      A 12,12 0 0 1 408,237
      A 12,12 0 0 1 420,249
      L 420,275
      A 12,12 0 0 1 408,287
      A 12,12 0 0 1 420,299
      L 420,368
      C 420,380 410,390 398,390
      L 348,390
      C 336,390 326,380 326,368
      L 326,245
      C 326,205 310,188 288,188
      C 266,188 250,205 250,245
      L 250,368
      C 250,380 240,390 228,390
      L 186,390
      C 174,390 164,380 164,368
      L 164,310
      C 164,285 152,272 138,272
      C 124,272 112,285 112,310
      L 112,368
      C 112,380 102,390 90,390
      L 92,368
      Z
    " fill="#FFFFFF" stroke="#FFFFFF" stroke-width="28" stroke-linejoin="round" stroke-linecap="round" />

    <!-- CIRCLE WHITE OUTLINE (Inside Middle Arch) -->
    <circle cx="256" cy="342" r="38" fill="#FFFFFF" stroke="#FFFFFF" stroke-width="28" />

    <!-- BLACK GAP SEPARATOR FOR CIRCLE -->
    <circle cx="256" cy="342" r="48" fill="none" stroke="#070708" stroke-width="12" />

    <!-- SILVER INNER FILL (Main Emblem Body) -->
    <path d="
      M 92,368
      L 92,205
      C 92,150 130,116 182,116
      C 220,116 246,138 256,162
      C 266,138 292,116 330,116
      C 382,116 420,150 420,205
      L 420,225
      A 12,12 0 0 1 408,237
      A 12,12 0 0 1 420,249
      L 420,275
      A 12,12 0 0 1 408,287
      A 12,12 0 0 1 420,299
      L 420,368
      C 420,380 410,390 398,390
      L 348,390
      C 336,390 326,380 326,368
      L 326,245
      C 326,205 310,188 288,188
      C 266,188 250,205 250,245
      L 250,368
      C 250,380 240,390 228,390
      L 186,390
      C 174,390 164,380 164,368
      L 164,310
      C 164,285 152,272 138,272
      C 124,272 112,285 112,310
      L 112,368
      C 112,380 102,390 90,390
      L 92,368
      Z
    " fill="url(#silverGrad)" />

    <!-- CIRCLE SILVER FILL -->
    <circle cx="256" cy="342" r="38" fill="url(#silverGrad)" />

  </g>
</svg>
